<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR: Tap to Place</title>
  
  <!-- Engine binary via CDN (NON servono file locali) -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" 
          async 
          crossorigin="anonymous" 
          data-preload-chunks="slam"></script>
  
  <meta name="8thwall:renderer" content="aframe:1.5.0"/>
  
  <style>
    body { margin: 0; overflow: hidden; }
    #prompt {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      text-align: center;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      width: fit-content;
      margin: 0 auto;
      pointer-events: none;
      font-family: sans-serif;
      z-index: 10;
    }
  </style>
</head>

<body>
<div id="prompt">🌵 Tocca il terreno per posizionare</div>

<a-scene
  tap-place
  renderer="colorManagement:true"
  xrweb="allowedDevices: any">

  <a-assets>
    <a-asset-item id="treeModel" src="tree.glb"></a-asset-item>
  </a-assets>

  <a-camera
    id="camera"
    position="0 8 0"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-entity
    light="type: directional; intensity: 0.8; castShadow: true; target: #camera"
    position="1 4.3 2.5"
    shadow>
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-box
    id="ground"
    class="cantap"
    scale="1000 2 1000"
    position="0 -1 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>
</a-scene>

<script>
  // Componente tap-place (attende AFRAME)
  (function() {
    function registerComponent() {
      if (typeof AFRAME === 'undefined') {
        setTimeout(registerComponent, 100);
        return;
      }
      
      AFRAME.registerComponent('tap-place', {
        init() {
          const ground = document.getElementById('ground');
          const promptEl = document.getElementById('prompt');
          
          ground.addEventListener('click', (event) => {
            if (promptEl) promptEl.style.display = 'none';
            
            const newElement = document.createElement('a-entity');
            const touchPoint = event.detail.intersection.point;
            newElement.setAttribute('position', touchPoint);
            
            const randomYRotation = Math.random() * 360;
            newElement.setAttribute('rotation', `0 ${randomYRotation} 0`);
            newElement.setAttribute('visible', 'false');
            newElement.setAttribute('scale', '0.0001 0.0001 0.0001');
            newElement.setAttribute('shadow', { receive: false });
            newElement.setAttribute('gltf-model', '#treeModel');
            
            this.el.sceneEl.appendChild(newElement);
            
            newElement.addEventListener('model-loaded', () => {
              newElement.setAttribute('visible', 'true');
              newElement.setAttribute('animation', {
                property: 'scale',
                to: '7 7 7',
                easing: 'easeOutElastic',
                dur: 800,
              });
            });
          });
        }
      });
      console.log('✅ Componente registrato');
    }
    registerComponent();
  })();
</script>
</body>
</html>
